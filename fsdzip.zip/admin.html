<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quick Med</title>
    <link rel="stylesheet" href="1stpage.css">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #0a2a66;
            font-size: 42px;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 40px;
            justify-content: center;
            align-items: start;
        }

        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        .dashboard-card {
            background-color: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-align: center;
            min-height: 250px;
        }

        .dashboard-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .dashboard-card h2 {
            color: rgb(12, 186, 255);
            font-size: 22px;
            margin-bottom: 20px;
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .card-count {
            font-size: 48px;
            font-weight: bold;
            color: #0a2a66;
            margin: 15px 0;
        }

        .card-description {
            color: #666;
            font-size: 14px;
        }
        .content-area {
            margin-top: 40px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none;
        }

        .content-area.active {
            display: block;
        }

        .content-area h3 {
            color: #0a2a66;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }

        .no-data {
            text-align: center;
            color: #888;
            font-size: 20px;
            padding: 40px;
        }

        .back-btn {
            background-color: rgb(12, 186, 255);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: red;
        }
        .doctor-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .doctor-info-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-radius: 15px;
            padding: 20px;
            border-left: 5px solid rgb(12, 186, 255);
            text-align: left;
        }

        .doctor-info-card h4 {
            color: #0a2a66;
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .doctor-info-card p {
            color: #555;
            margin: 5px 0;
            font-size: 14px;
        }

        .doctor-info-card .specialty {
            color: rgb(12, 186, 255);
            font-weight: bold;
        }

        .requests-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .requests-btn:hover {
            background-color: #f57c00;
        }

        .requests-area {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
            display: none;
        }

        .requests-area.active {
            display: block;
        }
    </style>
</head>
<body>
    <header style="background: #0a2a66; height: 100px; color: WHITE; font-size: 50PX; text-align: center; text-decoration: solid; line-height: 100px;">
        Welcome Admin!
    </header>

    <div class="main-container">
        <h1>Admin Dashboard</h1>

        <div class="grid-container">
            <div class="dashboard-card" onclick="showDoctors()">
                <div class="card-icon">👨‍⚕️</div>
                <h2>Doctors Registered</h2>
                <div class="card-count" id="doctorCount">3</div>
                <div class="card-description">Click to view registered doctors</div>
            </div>
            <div class="dashboard-card" onclick="showUsers()">
                <div class="card-icon">👤</div>
                <h2>Users</h2>
                <div class="card-count" id="userCount">0</div>
                <div class="card-description">Total registered users</div>
            </div>

            <div class="dashboard-card" onclick="showMedicines()">
                <div class="card-icon">💊</div>
                <h2>Medicines Ordered</h2>
                <div class="card-count" id="medicineCount">0</div>
                <div class="card-description">Total medicine orders</div>
            </div>
        </div>

        <div id="contentArea" class="content-area">
            <h3 id="contentTitle"></h3>
            <div id="contentBody"></div>
            <div style="text-align: center;">
                <button class="back-btn" onclick="hideContent()">Back to Dashboard</button>
            </div>
        </div>
    </div>
<script>
function showDoctors() {
  window.location.href = "doctorslist.html";   
}

function showUsers() {
    window.location.href = "users.html";  
}


function showMedicines() {
    window.location.href = "medicines.html";
}
</script>
  
</body>
</html>
